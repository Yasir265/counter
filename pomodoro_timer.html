
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{padding:1.5rem 1rem;max-width:480px;margin:0 auto}

.mode-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:2rem}
.mode-tab{padding:7px 16px;font-size:13px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:20px;cursor:pointer;background:transparent;color:var(--color-text-secondary);font-family:var(--font-sans);transition:all 0.15s}
.mode-tab:hover{background:var(--color-background-secondary)}
.mode-tab.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.mode-tab:focus-visible{outline:2px solid var(--color-border-info);outline-offset:2px}

.timer-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem 1.5rem;text-align:center;margin-bottom:1rem}

.ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 1.5rem}
.ring-wrap svg{width:200px;height:200px}
.ring-bg{fill:none;stroke:var(--color-background-secondary);stroke-width:8}
.ring-progress{fill:none;stroke-width:8;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1s linear,stroke 0.4s}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-time{font-size:40px;font-weight:500;color:var(--color-text-primary);letter-spacing:2px;line-height:1}
.ring-session-type{font-size:12px;color:var(--color-text-secondary);margin-top:4px}

.controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1.5rem}
.ctrl-btn{width:48px;height:48px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-primary);transition:background 0.15s;font-family:var(--font-sans)}
.ctrl-btn:hover{background:var(--color-background-secondary)}
.ctrl-btn:focus-visible{outline:2px solid var(--color-border-info);outline-offset:2px}
.ctrl-btn.primary{width:60px;height:60px;background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.ctrl-btn.primary:hover{opacity:0.85}

.session-dots{display:flex;gap:8px;justify-content:center;align-items:center}
.session-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--color-border-secondary);background:transparent;transition:background 0.2s,border-color 0.2s}
.session-dot.done{background:var(--color-text-primary);border-color:var(--color-text-primary)}
.session-dot.active{background:transparent;border-color:var(--color-text-primary)}
.session-label{font-size:12px;color:var(--color-text-secondary);margin-left:4px}

.stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center}
.stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}

.settings-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.settings-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.settings-header-label{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.settings-body{padding:0 16px 16px;display:none}
.settings-body.open{display:block}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:0.5px solid var(--color-border-tertiary)}
.setting-row:first-child{border-top:none}
.setting-lbl{font-size:13px;color:var(--color-text-primary)}
.setting-lbl small{display:block;font-size:11px;color:var(--color-text-secondary)}
.stepper{display:flex;align-items:center;gap:8px}
.step-btn{width:28px;height:28px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--color-text-primary);font-family:var(--font-sans);transition:background 0.15s}
.step-btn:hover{background:var(--color-background-secondary)}
.step-btn:focus-visible{outline:2px solid var(--color-border-info);outline-offset:2px}
.step-val{font-size:14px;font-weight:500;min-width:36px;text-align:center;color:var(--color-text-primary)}

.notification-banner{background:var(--color-background-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:10px 14px;font-size:13px;color:var(--color-text-success);margin-bottom:1rem;display:none;text-align:center;font-weight:500}
</style>

<div id="app" role="main">
  <h2 style="position:absolute;left:-9999px">Pomodoro timer — start, pause and configure work and break intervals</h2>

  <div class="mode-tabs" role="tablist" aria-label="Timer mode">
    <button class="mode-tab active" role="tab" aria-selected="true" data-mode="work" onclick="switchMode('work')" aria-label="Work session, 25 minutes">Work</button>
    <button class="mode-tab" role="tab" aria-selected="false" data-mode="short" onclick="switchMode('short')" aria-label="Short break, 5 minutes">Short break</button>
    <button class="mode-tab" role="tab" aria-selected="false" data-mode="long" onclick="switchMode('long')" aria-label="Long break, 15 minutes">Long break</button>
  </div>

  <div class="notification-banner" id="notif-banner" role="alert" aria-live="assertive"></div>

  <div class="timer-card" aria-label="Timer display">
    <div class="ring-wrap" aria-hidden="true">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="0" stroke="#534AB7"/>
      </svg>
      <div class="ring-center">
        <div class="ring-time" id="ring-time" aria-live="polite" aria-label="Time remaining">25:00</div>
        <div class="ring-session-type" id="ring-mode-label">Work session</div>
      </div>
    </div>

    <div class="controls" role="group" aria-label="Timer controls">
      <button class="ctrl-btn" id="reset-btn" onclick="resetTimer()" aria-label="Reset timer" title="Reset">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9A6 6 0 1 1 4.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="3,6 3,9 6,9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="ctrl-btn primary" id="play-btn" onclick="toggleTimer()" aria-label="Start timer" aria-pressed="false">
        <svg id="play-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><polygon points="6,4 16,10 6,16"/></svg>
        <svg id="pause-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="display:none"><rect x="5" y="4" width="3" height="12" rx="1"/><rect x="12" y="4" width="3" height="12" rx="1"/></svg>
      </button>
      <button class="ctrl-btn" id="skip-btn" onclick="skipSession()" aria-label="Skip to next session" title="Skip">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polyline points="4,4 12,9 4,14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="14" y1="4" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="session-dots" aria-label="Completed pomodoros this cycle" role="group">
      <div class="session-dot" id="dot-0" aria-label="Pomodoro 1"></div>
      <div class="session-dot" id="dot-1" aria-label="Pomodoro 2"></div>
      <div class="session-dot" id="dot-2" aria-label="Pomodoro 3"></div>
      <div class="session-dot" id="dot-3" aria-label="Pomodoro 4"></div>
      <span class="session-label" id="cycle-label" aria-live="polite">0 / 4 this cycle</span>
    </div>
  </div>

  <div class="stats-row" role="region" aria-label="Session statistics">
    <div class="stat-card">
      <div class="stat-val" id="stat-total" aria-live="polite">0</div>
      <div class="stat-lbl">Pomodoros</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-focus" aria-live="polite">0m</div>
      <div class="stat-lbl">Focus time</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-streak">0</div>
      <div class="stat-lbl">Best streak</div>
    </div>
  </div>

  <div class="settings-card">
    <div class="settings-header" onclick="toggleSettings()" role="button" aria-expanded="false" id="settings-toggle" tabindex="0" aria-controls="settings-body" onkeydown="if(event.key==='Enter'||event.key===' ')toggleSettings()">
      <span class="settings-header-label">Settings</span>
      <svg id="settings-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" style="color:var(--color-text-secondary);transition:transform 0.2s"><polyline points="4,6 8,10 12,6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="settings-body" id="settings-body" role="region" aria-label="Timer settings">
      <div class="setting-row">
        <div class="setting-lbl">Work session<small>minutes</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="changeSetting('work',-1)" aria-label="Decrease work duration">−</button>
          <span class="step-val" id="cfg-work" aria-live="polite" aria-label="Work duration in minutes">25</span>
          <button class="step-btn" onclick="changeSetting('work',1)" aria-label="Increase work duration">+</button>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-lbl">Short break<small>minutes</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="changeSetting('short',-1)" aria-label="Decrease short break duration">−</button>
          <span class="step-val" id="cfg-short" aria-live="polite" aria-label="Short break duration in minutes">5</span>
          <button class="step-btn" onclick="changeSetting('short',1)" aria-label="Increase short break duration">+</button>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-lbl">Long break<small>minutes</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="changeSetting('long',-1)" aria-label="Decrease long break duration">−</button>
          <span class="step-val" id="cfg-long" aria-live="polite" aria-label="Long break duration in minutes">15</span>
          <button class="step-btn" onclick="changeSetting('long',1)" aria-label="Increase long break duration">+</button>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-lbl">Sessions before long break<small>count</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="changeSetting('cycle',-1)" aria-label="Decrease sessions before long break">−</button>
          <span class="step-val" id="cfg-cycle" aria-live="polite">4</span>
          <button class="step-btn" onclick="changeSetting('cycle',1)" aria-label="Increase sessions before long break">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 88;

const cfg = { work: 25, short: 5, long: 15, cycle: 4 };
const MODE_COLORS = { work: '#534AB7', short: '#1D9E75', long: '#378ADD' };
const MODE_LABELS = { work: 'Work session', short: 'Short break', long: 'Long break' };

let state = {
  mode: 'work',
  running: false,
  secondsLeft: cfg.work * 60,
  totalSeconds: cfg.work * 60,
  pomodorosThisCycle: 0,
  totalPomodoros: 0,
  totalFocusMin: 0,
  streak: 0,
  bestStreak: 0,
  intervalId: null,
};

function playDing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    [0, 0.18, 0.36].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = [880, 1100, 1320][i];
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.18, t + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.6);
      osc.start(t + delay); osc.stop(t + delay + 0.6);
    });
  } catch(e) {}
}

function updateRing() {
  const progress = state.secondsLeft / state.totalSeconds;
  const offset = CIRCUMFERENCE * (1 - progress);
  const ring = document.getElementById('ring-progress');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = MODE_COLORS[state.mode];
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateUI() {
  document.getElementById('ring-time').textContent = formatTime(state.secondsLeft);
  document.getElementById('ring-time').setAttribute('aria-label', `${Math.floor(state.secondsLeft/60)} minutes ${state.secondsLeft%60} seconds remaining`);
  document.getElementById('ring-mode-label').textContent = MODE_LABELS[state.mode];
  updateRing();

  const playBtn = document.getElementById('play-btn');
  document.getElementById('play-icon').style.display = state.running ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = state.running ? 'block' : 'none';
  playBtn.setAttribute('aria-label', state.running ? 'Pause timer' : 'Start timer');
  playBtn.setAttribute('aria-pressed', state.running ? 'true' : 'false');

  document.querySelectorAll('.mode-tab').forEach(t => {
    const active = t.dataset.mode === state.mode;
    t.classList.toggle('active', active);
    t.setAttribute('aria-selected', active ? 'true' : 'false');
  });

  const n = cfg.cycle;
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.style.display = i < n ? 'block' : 'none';
    dot.classList.remove('done', 'active');
    if (i < state.pomodorosThisCycle) dot.classList.add('done');
    else if (i === state.pomodorosThisCycle && state.mode === 'work') dot.classList.add('active');
  }
  document.getElementById('cycle-label').textContent = `${state.pomodorosThisCycle} / ${cfg.cycle} this cycle`;
  document.getElementById('stat-total').textContent = state.totalPomodoros;
  document.getElementById('stat-focus').textContent = state.totalFocusMin + 'm';
  document.getElementById('stat-streak').textContent = state.bestStreak;
  document.title = `${formatTime(state.secondsLeft)} — ${MODE_LABELS[state.mode]}`;
}

function showNotif(msg) {
  const el = document.getElementById('notif-banner');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function sessionComplete() {
  playDing();
  clearInterval(state.intervalId);
  state.running = false;

  if (state.mode === 'work') {
    state.totalPomodoros++;
    state.pomodorosThisCycle++;
    state.totalFocusMin += cfg.work;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;

    if (state.pomodorosThisCycle >= cfg.cycle) {
      showNotif('Cycle complete! Time for a long break.');
      state.pomodorosThisCycle = 0;
      switchMode('long', true);
    } else {
      showNotif('Pomodoro done! Take a short break.');
      switchMode('short', true);
    }
  } else {
    showNotif('Break over. Ready to focus?');
    switchMode('work', true);
  }
}

function tick() {
  if (state.secondsLeft <= 0) { sessionComplete(); return; }
  state.secondsLeft--;
  updateUI();
}

function toggleTimer() {
  if (state.running) {
    clearInterval(state.intervalId);
    state.running = false;
    if (state.mode !== 'work') state.streak = 0;
  } else {
    state.running = true;
    state.intervalId = setInterval(tick, 1000);
  }
  updateUI();
}

function resetTimer() {
  clearInterval(state.intervalId);
  state.running = false;
  state.secondsLeft = cfg[state.mode] * 60;
  state.totalSeconds = cfg[state.mode] * 60;
  updateUI();
}

function skipSession() {
  clearInterval(state.intervalId);
  state.running = false;
  if (state.mode === 'work') {
    state.streak = 0;
    state.pomodorosThisCycle++;
    if (state.pomodorosThisCycle >= cfg.cycle) {
      state.pomodorosThisCycle = 0;
      switchMode('long');
    } else {
      switchMode('short');
    }
  } else {
    switchMode('work');
  }
}

function switchMode(mode, auto) {
  state.mode = mode;
  state.running = false;
  clearInterval(state.intervalId);
  state.secondsLeft = cfg[mode] * 60;
  state.totalSeconds = cfg[mode] * 60;
  if (auto) {
    state.running = true;
    state.intervalId = setInterval(tick, 1000);
  }
  updateUI();
}

function changeSetting(key, delta) {
  const min = key === 'cycle' ? 1 : 1;
  const max = key === 'cycle' ? 10 : 90;
  cfg[key] = Math.max(min, Math.min(max, cfg[key] + delta));
  document.getElementById(`cfg-${key}`).textContent = cfg[key];
  if (!state.running) {
    if ((key === 'work' && state.mode === 'work') ||
        (key === 'short' && state.mode === 'short') ||
        (key === 'long' && state.mode === 'long')) {
      state.secondsLeft = cfg[key] * 60;
      state.totalSeconds = cfg[key] * 60;
      updateUI();
    }
  }
  if (key === 'cycle') updateUI();
}

function toggleSettings() {
  const body = document.getElementById('settings-body');
  const toggle = document.getElementById('settings-toggle');
  const chevron = document.getElementById('settings-chevron');
  const isOpen = body.classList.toggle('open');
  toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  chevron.style.transform = isOpen ? 'rotate(180deg)' : '';
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
  if (e.code === 'KeyR') resetTimer();
  if (e.code === 'KeyS') skipSession();
});

updateUI();
</script>
